version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: medical_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: medical_receptionist

  api:
    build: .
    container_name: medical_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      MONGODB_URL: mongodb://mongo:27017
    depends_on:
      - mongo
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  mongo-express:
    image: mongo-express:latest
    container_name: medical_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      - mongo
    profiles:
      - dev

volumes:
  mongo_data:
